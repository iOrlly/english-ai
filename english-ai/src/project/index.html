<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Corretor de Inglês</title>
    </head>
    <body>
        <header>
            <h1>Corretor de Inglês</h1>
        </header>
        <main>
            <div id="text">
                <textarea id="entrada" placeholder="Digite sua frase em Inglês..."></textarea>
            </div>
            <div id="container">
                <button onclick="enviar()">Corrigir</button>

                <button onclick="ouvir()">🔊 Ouvir</button>

                <label class="voz-label" for="voz">Voz (TTS):</label>
                <select id="voz" aria-label="Escolher voz para leitura"></select>

                <pre id="resposta"></pre>
            </div>
        </main>
        
        <footer></footer>
        <script src="script.js"></script>
        <script src="reading.js"></script>
    </body>
</html>
